services:
  - type: web
    name: soma-connect-api
    env: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # Set to your Vercel frontend URL, e.g. https://soma-connect.vercel.app
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "SOMA Market <no-reply@somamarket.rw>"
      - key: COOKIE_SECURE
        value: "true"
      # IMPORTANT: Leave COOKIE_DOMAIN blank (empty string) for cross-origin
      # Vercel→Render deployments. Setting it to the Render subdomain causes
      # browsers to reject the cookie. Only set this if frontend and API share
      # a custom domain.
      - key: COOKIE_DOMAIN
        value: ""
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # REQUIRED: Set to https://<your-render-service>.onrender.com/api/auth/google/callback
      # Also register this exact URL in Google Cloud Console → OAuth 2.0 credentials.
      - key: GOOGLE_CALLBACK_URL
        sync: false
      # Upstash Redis — for persistent rate limiting across restarts.
      # Get values from upstash.com → your database → REST API.
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # HuggingFace — for AI-powered search (optional).
      - key: HF_API_TOKEN
        sync: false
